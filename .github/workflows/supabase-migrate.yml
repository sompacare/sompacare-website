# Run Prisma migrations against Supabase (manual or CI).
# Required GitHub repo secrets:
#   DATABASE_URL — Supabase *direct* connection (port 5432) for migrate deploy
#
# Usage: Actions → Supabase migrate → Run workflow

name: Supabase migrate

on:
  workflow_dispatch:
  push:
    branches: [platform]
    paths:
      - "packages/database/prisma/**"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Generate Prisma client
        run: npm run db:generate --workspace=@sompacare/database

      - name: Migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:migrate --workspace=@sompacare/database

      - name: Seed roles (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:seed:roles --workspace=@sompacare/database
        continue-on-error: true
