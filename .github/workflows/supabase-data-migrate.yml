# One-time copy Render Postgres -> Supabase.
# Secrets: RENDER_DATABASE_URL, SUPABASE_DIRECT_URL (Session pooler URI recommended for CI ? IPv4)
# Enable pooler: Supabase Dashboard -> Project Settings -> Database -> Connection pooling -> Session mode URI

name: Supabase data migrate

on:
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dump Render database (Postgres 18 client)
        env:
          RENDER_DATABASE_URL: ${{ secrets.RENDER_DATABASE_URL }}
        run: |
          docker run --rm \
            -e RENDER_DATABASE_URL \
            -v "$PWD:/dump" \
            postgres:18 \
            pg_dump "$RENDER_DATABASE_URL" --no-owner --no-acl -F c -f /dump/sompacare.dump
          ls -lh sompacare.dump

      - name: Upload Render dump artifact
        uses: actions/upload-artifact@v4
        with:
          name: sompacare-render-dump
          path: sompacare.dump
          retention-days: 7

      - name: Restore into Supabase
        env:
          SUPABASE_DIRECT_URL: ${{ secrets.SUPABASE_DIRECT_URL }}
        run: |
          docker run --rm \
            -e SUPABASE_DIRECT_URL \
            -v "$PWD:/dump" \
            postgres:18 \
            pg_restore -d "$SUPABASE_DIRECT_URL" --no-owner --no-acl --clean --if-exists /dump/sompacare.dump

      - name: Prisma migrate deploy (idempotent)
        if: success()
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DIRECT_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.SUPABASE_DIRECT_URL }}
        run: |
          npm ci --include=dev
          npm run db:generate --workspace=@sompacare/database
          npm run db:migrate:deploy --workspace=@sompacare/database
        continue-on-error: true

      - name: Seed roles (idempotent)
        if: success()
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DIRECT_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.SUPABASE_DIRECT_URL }}
        run: npm run db:seed:roles --workspace=@sompacare/database
        continue-on-error: true
