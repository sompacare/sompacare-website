name: CI

on:
  push:
    branches: [main, master, platform]
  pull_request:
    branches: [main, master, platform]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sompacare
          POSTGRES_PASSWORD: sompacare_ci
          POSTGRES_DB: sompacare_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sompacare -d sompacare_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://sompacare:sompacare_ci@localhost:5432/sompacare_platform?schema=public
      DIRECT_DATABASE_URL: postgresql://sompacare:sompacare_ci@localhost:5432/sompacare_platform?schema=public
      REDIS_URL: redis://localhost:6379
      AUTH_ALLOW_DEV_TOKENS: "true"
      METRICS_ENABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build shared packages
        run: |
          npm run build --workspace=@sompacare/shared
          npm run build --workspace=@sompacare/database

      - name: Run RBAC tests
        run: npm run test:rbac

      - name: Run mobile-shared tests
        run: npm run test:mobile-shared

      - name: Build API
        run: npm run build --workspace=@sompacare/api

      - name: Build portals
        run: |
          export NODE_OPTIONS=--max-old-space-size=4096
          npm run build --workspace=@sompacare/nurse-portal
          npm run build --workspace=@sompacare/facility-portal
          npm run build --workspace=@sompacare/admin-portal
          npm run build --workspace=@sompacare/recruiter-portal

      - name: Lint API
        continue-on-error: true
        run: npm run lint --workspace=@sompacare/api --if-present

  terraform-validate:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  docker-build-api:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t sompacare-api:ci .
