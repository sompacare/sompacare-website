# Render Blueprint — Sompacare Platform API
services:
  - type: web
    name: sompacare-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: sompacare-db
          property: connectionString
      - key: AUTH_ALLOW_DEV_TOKENS
        value: "false"
      - key: GEOFENCE_DEV_BYPASS
        value: "false"
      - key: PAYMENTS_DEV_BYPASS
        value: "false"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: NURSE_PORTAL_URL
        sync: false
      - key: FACILITY_PORTAL_URL
        sync: false
      - key: RECRUITER_PORTAL_URL
        sync: false
      - key: ADMIN_PORTAL_URL
        sync: false

databases:
  - name: sompacare-db
    plan: free
    databaseName: sompacare_platform
